<!doctype html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portofolio & CV Online - Revita Nada Yuanika Putri, Mahasiswa Teknologi Rekayasa Otomasi Universitas Diponegoro." />
    <title>Revita Nada Yuanika Putri | Automation & IoT Engineering Portfolio</title>
    
    <!-- Google Fonts: Premium typography stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; background: #1e1e2e; color: #ff5555; font-family: monospace; overflow: auto; border: 2px solid #ff5555; border-radius: 8px; margin: 20px;">' +
            '<h3>Runtime Error:</h3>' +
            '<p><strong>Message:</strong> ' + msg + '</p>' +
            '<p><strong>Location:</strong> ' + url + ':' + line + ':' + col + '</p>' +
            '<pre style="white-space: pre-wrap;">' + (error ? error.stack : 'No stack trace') + '</pre>' +
            '</div>';
        }
      };
      window.addEventListener('unhandledrejection', function(event) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; background: #1e1e2e; color: #ff5555; font-family: monospace; overflow: auto; border: 2px solid #ff5555; border-radius: 8px; margin: 20px;">' +
            '<h3>Unhandled Promise Rejection:</h3>' +
            '<p><strong>Reason:</strong> ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown') + '</p>' +
            '<pre style="white-space: pre-wrap;">' + (event.reason && event.reason.stack ? event.reason.stack : 'No stack trace') + '</pre>' +
            '</div>';
        }
      });
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 font-sans selection:bg-teal-500 selection:text-slate-950 overflow-x-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
